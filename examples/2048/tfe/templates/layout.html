<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <link rel="icon" href="data:,">
  <title>{{ title }}</title>
  {% if og_image %}
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{ title }}">
  <meta property="og:description" content="{{ og_description }}">
  <meta property="og:image" content="{{ og_image }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="{{ og_image }}">
  {% endif %}
  <link rel="stylesheet" href="{{ styles_href }}">
  <script type="module" src="{{ datastar_src }}"></script>
  <script src="{{ script_src }}" defer></script>
</head>
<body class="{{ body_class }}"{% for a in body_attrs %} {{ a.key }}="{{ a.value }}"{% endfor %}>
<header class="site-header">
  <div class="site-header-left">
    <a class="site-title" href="https://http-nu.cross.stream/examples/2048/">2048.nu</a>
  </div>
  <div class="site-header-right">
    <div class="status">
      <span id="conn" class="stat"></span>
      <span id="rtt" class="stat"></span>
    </div>
    <span class="credit">
      <a href="https://http-nu.cross.stream">served by <img src="{{ ellie_href }}" alt="ellie" class="mascot"></a>
    </span>
  </div>
</header>
{{ body_html | safe }}
</body>
</html>
